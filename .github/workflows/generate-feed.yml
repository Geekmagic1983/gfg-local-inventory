name: Generate Local Inventory Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate local inventory TSV
        run: python3 scripts/generate_feed.py

      - name: Commit and push feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/local-inventory.tsv
          git diff --cached --quiet || git commit -m "Update local inventory feed $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
